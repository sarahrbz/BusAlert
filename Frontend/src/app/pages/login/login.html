<div class="login-container">

  <div class="top-section">

  </div>

  <div class="form-section">

    <h2>Bem-vindo(a) de volta!</h2>

    <p>Faça login para continuar</p>


    <div class="input-group">

      <input
        type="email"
        placeholder="E-mail ou telefone"
        [(ngModel)]="email">

    </div>

    <div class="input-group">

      <input
        type="password"
        placeholder="Senha"
        [(ngModel)]="senha">

    </div>

    <a class="forgot-password"
    routerLink="/recuperar-senha">
      Esqueceu sua senha?
    </a>

    <button (click)="login()">
      Entrar
    </button>

    <div class="divider">
  <div class="line"></div>

  <span>ou continue com</span>

  <div class="line"></div>
</div>

    <div class="social-buttons">

      <button
  class="social-btn"
  (click)="loginGoogle()">

  Google

</button>

      <button
  class="social-btn"
  (click)="loginApple()">

  Apple

</button>

    </div>

    <div class="register">

      Ainda não tem uma conta?

      <a routerLink="/cadastro">
        Criar conta
      </a>

    </div>

  </div>

</div>
