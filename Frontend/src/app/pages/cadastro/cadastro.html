<div class="login-container">

  <div class="top-section">

  </div>

  <div class="form-section">

    <h2>Criar Conta</h2>

    <p>Cadastre-se para começar</p>

    <div class="input-group">
      <input
        type="text"
        placeholder="Nome completo"
        [(ngModel)]="nome">
    </div>

    <div class="input-group">
      <input
        type="email"
        placeholder="E-mail"
        [(ngModel)]="email">
    </div>

    <div class="input-group">
      <input
        type="text"
        placeholder="Telefone (opcional)"
        [(ngModel)]="telefone">
    </div>

    <div class="input-group">
      <input
        type="password"
        placeholder="Senha"
        [(ngModel)]="senha">
    </div>

    <div class="input-group">
      <input
        type="password"
        placeholder="Confirmar senha"
        [(ngModel)]="confirmarSenha">
    </div>

    <button (click)="cadastrar()">
      Criar Conta
    </button>

    <div class="divider">
      <div class="line"></div>

      <span>ou cadastre-se com</span>

      <div class="line"></div>
    </div>

    <div class="social-buttons">

      <button
  class="social-btn"
  (click)="loginGoogle()">

  Google

</button>

      <button
  class="social-btn"
  (click)="loginApple()">

  Apple

</button>

    </div>

    <div class="register">

      Já possui uma conta?

      <a routerLink="/login">
        Entrar >
      </a>

    </div>

  </div>

</div>
