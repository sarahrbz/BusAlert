<h1>Cadastro BusAlert</h1>

<div>

  <input
    type="text"
    placeholder="Nome"
    [(ngModel)]="nome">

  <br><br>

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="email">

  <br><br>

  <input
    type="password"
    placeholder="Senha"
    [(ngModel)]="senha">

  <br><br>

  <button (click)="cadastrar()">
    Cadastrar
  </button>

</div>
